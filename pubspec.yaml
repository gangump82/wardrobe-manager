name: wardrobe_manager
description: 衣橱管家 - 智能衣物管理与穿搭助手
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # 状态管理
  provider: ^6.1.1
  
  # 本地存储
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # 图像处理
  image_picker: ^1.0.7
  camera: ^0.10.5+9
  
  # 网络
  dio: ^5.4.0
  
  # UI组件
  flutter_staggered_grid_view: ^0.7.0
  cached_network_image: ^3.3.1
  
  # 工具
  intl: ^0.18.1
  uuid: ^4.3.1
  path_provider: ^2.1.2
  
  # AI 能力
  speech_to_text: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
